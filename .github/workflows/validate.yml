name: Validate

on:
  push:
  pull_request:

jobs:
  python-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Compile public scripts
        run: python -m py_compile scripts/*.py
      - name: Dry-run pipeline plan
        run: python scripts/run_pipeline.py --dry-run
